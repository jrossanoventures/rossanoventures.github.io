<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 0; background: #1a1a18; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="312" viewBox="0 0 820 312">

  <!-- Background -->
  <rect width="820" height="312" fill="#2C2C2A"/>

  <!-- Geometric accent shapes -->
  <rect x="0" y="0" width="820" height="4" fill="#EF9F27"/>

  <!-- Large subtle R watermark -->
  <text x="480" y="340" font-family="Georgia, serif" font-size="420" font-weight="700" fill="#3a3a38" text-anchor="middle">R</text>

  <!-- Diagonal accent lines -->
  <line x1="0" y1="312" x2="280" y2="0" stroke="#EF9F27" stroke-width="0.5" opacity="0.2"/>
  <line x1="40" y1="312" x2="320" y2="0" stroke="#EF9F27" stroke-width="0.5" opacity="0.1"/>
  <line x1="80" y1="312" x2="360" y2="0" stroke="#EF9F27" stroke-width="0.5" opacity="0.07"/>

  <!-- Left side monogram box -->
  <rect x="52" y="80" width="140" height="140" rx="28" fill="#1f1f1d"/>
  <rect x="52" y="80" width="140" height="140" rx="28" fill="none" stroke="#EF9F27" stroke-width="1" opacity="0.4"/>
  <text x="100" y="178" font-family="Georgia, serif" font-size="80" font-weight="700" fill="white" text-anchor="middle">R</text>
  <text x="162" y="178" font-family="Georgia, serif" font-size="58" font-weight="400" fill="#EF9F27" text-anchor="middle">V</text>

  <!-- Vertical divider -->
  <line x1="230" y1="80" x2="230" y2="232" stroke="#EF9F27" stroke-width="1" opacity="0.3"/>

  <!-- Main text block -->
  <text x="258" y="148" font-family="Georgia, serif" font-size="54" font-weight="700" fill="white">Rossano</text>
  <text x="258" y="206" font-family="Georgia, serif" font-size="54" font-weight="300" fill="#EF9F27">Ventures</text>

  <!-- Tagline -->
  <rect x="258" y="222" width="300" height="1.5" fill="#EF9F27" opacity="0.5"/>
  <text x="258" y="244" font-family="Georgia, serif" font-size="13" font-weight="400" fill="#888780" letter-spacing="3">COMMERCE  &amp;  INTELLIGENCE</text>

  <!-- Right side two pillars -->
  <rect x="610" y="88" width="180" height="64" rx="8" fill="#1f1f1d"/>
  <rect x="610" y="88" width="180" height="64" rx="8" fill="none" stroke="#3d3d3a" stroke-width="1"/>
  <text x="700" y="116" font-family="Georgia, serif" font-size="11" font-weight="400" fill="#EF9F27" text-anchor="middle" letter-spacing="2">COMMERCE</text>
  <text x="700" y="136" font-family="Georgia, serif" font-size="11" font-weight="300" fill="#888780" text-anchor="middle" letter-spacing="1">Resale &amp; Liquidation</text>

  <rect x="610" y="164" width="180" height="64" rx="8" fill="#1f1f1d"/>
  <rect x="610" y="164" width="180" height="64" rx="8" fill="none" stroke="#3d3d3a" stroke-width="1"/>
  <text x="700" y="192" font-family="Georgia, serif" font-size="11" font-weight="400" fill="#EF9F27" text-anchor="middle" letter-spacing="2">TECHNOLOGY</text>
  <text x="700" y="212" font-family="Georgia, serif" font-size="11" font-weight="300" fill="#888780" text-anchor="middle" letter-spacing="1">AI Solutions</text>

  <!-- Bottom location -->
  <text x="258" y="280" font-family="Georgia, serif" font-size="11" fill="#555553" letter-spacing="2">ATLANTA, GEORGIA</text>

  <!-- Bottom amber line -->
  <rect x="0" y="308" width="820" height="4" fill="#EF9F27"/>

</svg>
</body>
</html>
